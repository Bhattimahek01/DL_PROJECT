services:
  - type: web
    name: smart-proctor-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r SmartProctor_AI/backend/requirements.txt
    startCommand: cd SmartProctor_AI/backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
